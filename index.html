    <template id="tmpl-how-it-works">
      <div class="modal-content">
        <h2 class="modal-title">how it works</h2>
        <ol class="steps">
          <li>
            <span class="step-num">01</span>
            <div>
              <h3>pick a cover image</h3>
              <p>
                Drop in any photo your browser can open. Veilpix decodes it to raw
                pixels on a <code>&lt;canvas&gt;</code> — no upload, the bytes stay
                in this tab.
              </p>
            </div>
          </li>
          <li>
            <span class="step-num">02</span>
            <div>
              <h3>encrypt the secret</h3>
              <p>
                Your message or file is encrypted with AES-GCM-256. The key is
                derived from your passphrase with PBKDF2 (210,000 rounds of
                SHA-256) using the Web Crypto API. The original filename is sealed
                <em>inside</em> the ciphertext.
              </p>
            </div>
          </li>
          <li>
            <span class="step-num">03</span>
            <div>
              <h3>weave it into the pixels</h3>
              <p>
                A worker rewrites the least-significant bit of each red, green and
                blue channel to carry the ciphertext. The change is ±1 per channel —
                invisible to the eye, but it's all there.
              </p>
            </div>
          </li>
          <li>
            <span class="step-num">04</span>
            <div>
              <h3>download a lossless PNG</h3>
              <p>
                The result is re-encoded as PNG — lossless, so the hidden bits
                survive. Share it like any other image. <strong>Don't convert it to
                JPEG</strong>; recompression would scrub the payload.
              </p>
            </div>
          </li>
          <li>
            <span class="step-num">05</span>
            <div>
              <h3>reveal on the other side</h3>
              <p>
                The recipient drops the PNG into Veilpix's Reveal tab and enters the
                same passphrase. The worker reads the LSBs, verifies the container,
                and decrypts — recovering the original message or file.
              </p>
            </div>
          </li>
        </ol>
      </div>
    </template>

    <template id="tmpl-security">
      <div class="modal-content">
        <h2 class="modal-title">threat model</h2>
        <div class="security-grid">
          <div class="security-card good">
            <h3>what's protected</h3>
            <ul>
              <li>Secret contents — AES-GCM-256 authenticated encryption</li>
              <li>The secret's filename — sealed inside the ciphertext</li>
              <li>The cover image — decoded and re-encoded in your browser, never uploaded</li>
              <li>The passphrase — used only in this tab, never stored or sent</li>
            </ul>
          </div>
          <div class="security-card bad">
            <h3>what isn't</h3>
            <ul>
              <li>
                <em>That</em> something is hidden — LSB steganography shifts pixel
                statistics, so steganalysis can detect a payload's presence (not its
                contents)
              </li>
              <li>The rough upper bound on payload size, implied by the image dimensions</li>
              <li>
                Durability through recompression — saving the PNG as JPEG, or running
                it through a service that re-encodes images, destroys the hidden data
              </li>
            </ul>
          </div>
          <div class="security-card">
            <h3>trust model</h3>
            <ul>
              <li>Sender and receiver must share the passphrase out-of-band</li>
              <li>The passphrase <em>is</em> the secret — anyone who has it and the image can decrypt</li>
              <li>Your images never talk to a server: no uploads, no fonts, no calls with your data — the only third-party request is the cookie-less Cloudflare Web Analytics page-view counter</li>
            </ul>
          </div>
        </div>
      </div>
    </template>

    <template id="tmpl-about">
      <div class="modal-content">
        <h2 class="modal-title">about</h2>
        <p class="about-lead">
          <strong>Veilpix</strong> hides an encrypted message or file inside the
          pixels of an ordinary image — a technique called <span class="glossary-link" data-term="steganography">steganography</span>.
          Unlike a visibly-encrypted blob, the output just looks like a picture.
        </p>
        <p>
          Everything happens locally in your browser using the Web Crypto and Canvas
          APIs. The cover image, your secret and your passphrase never leave your
          device. There is no server and no account. The only analytics is
          Cloudflare Web Analytics — anonymous, cookie-less page-view counts; no
          personal data, no cross-site tracking.
        </p>
        <p>
          Built by

          Source on
          <a href="https://github.com/ben-gy/veilpix" target="_blank" rel="noopener noreferrer">GitHub</a>.
          Released under the MIT license.
        </p>
      </div>
    </template>
