<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Veilpix">
  <defs>
    <linearGradient id="vp-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
  </defs>
  <!-- image tile -->
  <rect x="3" y="5" width="26" height="22" rx="3" fill="#0a0e1a" stroke="url(#vp-grad)" stroke-width="1.6" />
  <!-- pixel grid hint -->
  <g fill="url(#vp-grad)" opacity="0.18">
    <rect x="6" y="8" width="3" height="3" />
    <rect x="13" y="8" width="3" height="3" />
    <rect x="20" y="8" width="3" height="3" />
    <rect x="9" y="14" width="3" height="3" />
    <rect x="16" y="14" width="3" height="3" />
    <rect x="23" y="14" width="3" height="3" />
    <rect x="6" y="20" width="3" height="3" />
    <rect x="13" y="20" width="3" height="3" />
  </g>
  <!-- hidden key/lock motif -->
  <circle cx="16" cy="15" r="4.4" fill="none" stroke="url(#vp-grad)" stroke-width="1.8" />
  <circle cx="16" cy="15" r="1.6" fill="#0a0e1a" />
  <rect x="15.1" y="15" width="1.8" height="5.2" rx="0.9" fill="url(#vp-grad)" />
